name: dev

services:

  redis:
    build: .
    container_name: redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=123456
    volumes:
      - ~/Docker/redis/data:/data
    ports:
      - 6379:6379

  redis_win:
    build: .
    container_name: redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=123456
    volumes:
      - /mnt/d/Docker/redis/data:/data
    ports:
      - 6379:6379

  nas:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - /share/Container/redis/data:/data
    ports:
      - 6379:6379
    command: redis-server --appendonly yes --loglevel warning
